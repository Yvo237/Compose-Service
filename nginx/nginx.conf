events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    server {
        listen 80;
        server_name localhost;

        # Service d'Analyse
        location /api/v1/analysis/ {
            proxy_pass http://analysis_service:8000/v1/analysis/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Service de Collecte
        location /api/v1/data/ {
            proxy_pass http://data_collection_service:8001/v1/data/;
            proxy_set_header Host $host;
        }

        # Point d'entrée pour la collecte et l'analyse combinée
        location /api/v1/collect/ {
            proxy_pass http://data_collection_service:8001/collect-and-analyze;
            proxy_set_header Host $host;
        }
    }
}