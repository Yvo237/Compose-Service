events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Augmenter la limite de taille pour les uploads
    client_max_body_size 500M;
    client_body_timeout 300s;

    # CORS support pour les requêtes OPTIONS
    map $request_method $cors_method {
        OPTIONS 204;
        default 0;
    }

    server {
        listen 80;
        server_name _;

        # Frontend statique servi par le service reporting_service interne
        location / {
            proxy_pass http://reporting_service:80;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Service d'Analyse
        location /api/v1/analysis/ {
            if ($request_method = OPTIONS) {
                add_header Access-Control-Allow-Origin "https://reporting-service-chi.vercel.app";
                add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS";
                add_header Access-Control-Allow-Headers "DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization";
                add_header Access-Control-Max-Age 1728000;
                add_header Content-Type "text/plain; charset=utf-8";
                add_header Content-Length 0;
                return 204;
            }
            
            proxy_pass http://analytics_service:8000/v1/analysis/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            add_header Access-Control-Allow-Origin "https://reporting-service-chi.vercel.app" always;
        }

        # Service d'Ingestion
        location /api/v1/data/ {
            if ($request_method = OPTIONS) {
                add_header Access-Control-Allow-Origin "https://reporting-service-chi.vercel.app";
                add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS";
                add_header Access-Control-Allow-Headers "DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization";
                add_header Access-Control-Max-Age 1728000;
                add_header Content-Type "text/plain; charset=utf-8";
                add_header Content-Length 0;
                return 204;
            }
            
            proxy_pass http://ingestion_service:8001/v1/data/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            add_header Access-Control-Allow-Origin "https://reporting-service-chi.vercel.app" always;
        }

        # Point d'entrée pour la collecte et l'analyse combinée
        location /api/v1/collect/ {
            proxy_pass http://ingestion_service:8001/collect-and-analyze;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Health check route pour le service d'Ingestion
        location /v1/health {
            if ($request_method = OPTIONS) {
                add_header Access-Control-Allow-Origin "https://reporting-service-chi.vercel.app";
                add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS";
                add_header Access-Control-Allow-Headers "DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization";
                add_header Access-Control-Max-Age 1728000;
                add_header Content-Type "text/plain; charset=utf-8";
                add_header Content-Length 0;
                return 204;
            }
            
            proxy_pass http://ingestion_service:8001/v1/health;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            add_header Access-Control-Allow-Origin "https://reporting-service-chi.vercel.app" always;
        }

        # Health check route pour le frontend (API_BASE_URL = /api/v1)
        location /api/v1/health {
            if ($request_method = OPTIONS) {
                add_header Access-Control-Allow-Origin "https://reporting-service-chi.vercel.app";
                add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS";
                add_header Access-Control-Allow-Headers "DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization";
                add_header Access-Control-Max-Age 1728000;
                add_header Content-Type "text/plain; charset=utf-8";
                add_header Content-Length 0;
                return 204;
            }
            
            proxy_pass http://ingestion_service:8001/v1/health;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            add_header Access-Control-Allow-Origin "https://reporting-service-chi.vercel.app" always;
        }

        # Metrics endpoints pour le frontend
        location /api/v1/metrics/ {
            if ($request_method = OPTIONS) {
                add_header Access-Control-Allow-Origin "https://reporting-service-chi.vercel.app";
                add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS";
                add_header Access-Control-Allow-Headers "DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization";
                add_header Access-Control-Max-Age 1728000;
                add_header Content-Type "text/plain; charset=utf-8";
                add_header Content-Length 0;
                return 204;
            }
            
            proxy_pass http://ingestion_service:8001/v1/metrics/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Upload endpoint pour le frontend
        location /api/v1/upload {
            proxy_pass http://ingestion_service:8001/upload;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Upload endpoint pour le frontend (sans /v1)
        location /api/upload {
            proxy_pass http://ingestion_service:8001/upload;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Analyze endpoint pour le frontend
        location /api/v1/analyze/ {
            proxy_pass http://ingestion_service:8001/analyze/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Analyze endpoint pour le frontend (sans /v1)
        location /api/analyze/ {
            proxy_pass http://ingestion_service:8001/analyze/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # WebSocket endpoint pour les logs
        location /api/ws/logs/ {
            proxy_pass http://ingestion_service:8001/ws/logs/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 86400;
        }
    }
}