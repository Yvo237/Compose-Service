services:
  notification_service:
    build:
      context: ../../notification_service
      dockerfile: Dockerfile
      target: development
    container_name: notification_service
    volumes:
      - ../../notification_service:/app:delegated
      - ../email-templates:/app/templates:ro
      - /app/tmp
      - /app/__pycache__
    working_dir: /app
    environment:
      - PYTHONPATH=/app
      - PYTHONUNBUFFERED=1
      - ENV=development
      - DATABASE_URL=postgresql://admin:admin1234@analysis_db:5432/analysis_db
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USERNAME=${SMTP_USERNAME}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - EMAIL_FROM=${EMAIL_FROM}
      - NOTIFICATION_EMAIL=${NOTIFICATION_EMAIL}
      - ADMIN_NAME=${ADMIN_NAME}
    ports:
      - "8002:8002"
    networks:
      - analysis_network
    depends_on:
      - postgres
      - mailhog
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
