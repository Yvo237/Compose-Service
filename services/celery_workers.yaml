services:
  celery_worker:
    build:
      context: ../../Ingestion-Service
      dockerfile: Dockerfile
      target: production
    environment:
      - ENV=production
      - DATABASE_URL=postgresql://${DB_USER:-admin}:${DB_PASSWORD:-password}@analysis_db:5432/${DB_NAME:-analysis_db}
      - CELERY_BROKER_URL=redis://redis_queue:6379/0
      - CELERY_RESULT_BACKEND=redis://redis_queue:6379/0
    command: ["python", "celery_worker.py"]
    networks:
      - analysis_network
    depends_on:
      - redis
      - postgres
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "ps aux | grep 'celery' | grep -v grep >/dev/null 2>&1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    scale: 2  # 2 workers en parallèle
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M

  celery_beat:
    build:
      context: ../../Ingestion-Service
      dockerfile: Dockerfile
      target: production
    container_name: celery_beat
    environment:
      - ENV=production
      - DATABASE_URL=postgresql://${DB_USER:-admin}:${DB_PASSWORD:-password}@analysis_db:5432/${DB_NAME:-analysis_db}
      - CELERY_BROKER_URL=redis://redis_queue:6379/0
      - CELERY_RESULT_BACKEND=redis://redis_queue:6379/0
    command: ["python", "celery_beat.py"]
    networks:
      - analysis_network
    depends_on:
      - redis
      - postgres
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "ps aux | grep 'celery' | grep -v grep >/dev/null 2>&1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
